<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Search sessions</title>
  <link rel="stylesheet" href="/static/style.css?v=84" />
</head>
<body>
  <header class="topbar">
    <nav id="topnav" class="topnav"></nav>
    <span class="spacer"></span>
    <span class="meta" id="meta"></span>
  </header>
  <main>
    <div class="search-bar">
      <input id="q" type="text" autofocus
             placeholder="Search by title, session ID, or path — wildcards ok (e.g. *docker*, build*, df8c1588) …" />
    </div>
    <label class="hist-toggle" style="margin:8px 2px 12px">
      <input type="checkbox" id="incArchived" /> include archived
    </label>
    <div id="projFilter" class="proj-filter"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">Type to search by title, session ID, or project path. Wildcards * and ? supported.</div>
  </main>
  <script src="/static/app.js?v=84"></script>
  <script>renderTopNav("search"); Search.init();</script>
</body>
</html>
