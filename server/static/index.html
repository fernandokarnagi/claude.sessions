<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Sessions</title>
  <link rel="stylesheet" href="/static/style.css?v=10" />
</head>
<body>
  <header class="topbar">
    <h1>🪐 Claude Sessions</h1>
    <a class="navlink" href="/search.html">🔎 Search</a>
    <button class="toggle" id="attentionToggle" title="Show only sessions waiting on you">⚠ Needs attention</button>
    <span class="spacer"></span>
    <button class="toggle" id="notifyToggle" title="Notify me when a session starts waiting">🔔 Notify</button>
    <span class="meta" id="meta"></span>
    <label class="meta" id="limitLabel">Show:
      <select id="limit">
        <option value="10" selected>10</option>
        <option value="25">25</option>
        <option value="50">50</option>
        <option value="all">All</option>
      </select>
    </label>
  </header>
  <main>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">No sessions found.</div>
  </main>
  <script src="/static/app.js?v=10"></script>
  <script>Dashboard.init();</script>
</body>
</html>
