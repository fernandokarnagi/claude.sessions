<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Sessions</title>
  <link rel="stylesheet" href="/static/style.css?v=85" />
</head>
<body>
  <header class="topbar">
    <nav id="topnav" class="topnav"></nav>
    <span class="spacer"></span>
    <button class="toggle" id="dispatchBtn" title="Spawn a new session for a task">✨ Dispatch</button>
    <button class="toggle" id="notifyToggle" title="Notify me when a session starts waiting">🔔 Notify</button>
    <span class="meta" id="meta"></span>
  </header>
  <div id="projFilter" class="proj-filter"></div>
  <div id="board" class="board"></div>
  <script src="/static/app.js?v=85"></script>
  <script>
    renderTopNav("board");
    Board.init();
    document.getElementById("dispatchBtn").addEventListener("click", () => Dispatch.open());
  </script>
</body>
</html>
