<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Session detail</title>
  <link rel="stylesheet" href="/static/style.css?v=24" />
</head>
<body>
  <header class="topbar">
    <a class="back" href="/">← Board</a>
    <span class="spacer"></span>
    <span class="meta" id="meta"></span>
  </header>
  <main>
    <div id="header"></div>
    <div id="approval"></div>
    <div id="summary"></div>
    <div id="chat" class="chat"></div>
    <div class="hist-bar">
      <h3 class="hist-title">History (newest first)</h3>
      <label class="hist-toggle" title="Off = only user & assistant messages (faster). On = also tool calls, results, thinking.">
        <input type="checkbox" id="showAll" /> show tool / thinking
      </label>
    </div>
    <div id="events"></div>
  </main>
  <script src="/static/app.js?v=24"></script>
  <script>Detail.init();</script>
</body>
</html>
