<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Session detail</title>
  <link rel="stylesheet" href="/static/style.css?v=84" />
</head>
<body>
  <header class="topbar">
    <nav id="topnav" class="topnav"></nav>
    <span class="spacer"></span>
    <span class="meta" id="meta"></span>
  </header>
  <div class="detail-layout">
    <aside id="attnRail" class="attn-rail" hidden></aside>
    <main>
      <div id="header"></div>
      <div id="approval"></div>
      <div id="chat" class="chat"></div>
      <div class="hist-bar">
        <h3 class="hist-title">History (newest first)</h3>
        <label class="hist-toggle" title="How many of the latest entries to show.">
          show
          <select id="histLimit">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="40">40</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="all">all</option>
          </select>
        </label>
        <label class="hist-toggle" title="Off = only user & assistant messages (faster). On = also tool calls, results, thinking.">
          <input type="checkbox" id="showAll" /> show tool / thinking
        </label>
      </div>
      <div id="events"></div>
    </main>
  </div>
  <script src="/static/app.js?v=84"></script>
  <script>
    (async function () {
      const q = new URLSearchParams(location.search);
      const fromTodo = q.get("from") === "attention";
      const id = q.get("id");
      // To-do landing with no explicit session: jump to the top to-do session so
      // the rail highlights it and refresh/bookmark keeps working.
      if (fromTodo && !id) {
        try {
          const d = await getJSON("/api/triage");
          if (d.sessions && d.sessions.length) {
            location.replace(`/session.html?id=${encodeURIComponent(d.sessions[0].session_id)}&from=attention`);
            return;
          }
        } catch (e) { /* fall through to empty state */ }
      }
      renderTopNav(fromTodo ? "todo" : null);
      if (fromTodo) AttnRail.init();
      if (id) {
        Detail.init();
      } else if (fromTodo) {
        document.getElementById("header").innerHTML =
          '<div class="empty">🎉 Nothing on your to-do list. Add a session with “➕ Add to To-do”, or it appears here while it has a live session.</div>';
        document.getElementById("meta").textContent = "To-do";
        document.querySelector(".hist-bar").style.display = "none";
      } else {
        Detail.init();   // no id, not from to-do → Detail shows the missing-id notice
      }
    })();
  </script>
</body>
</html>
